services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybrid_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - postgres
      - mongo
      - postgres_test
      - mongo_test
    environment:
      TEST_DATABASE_URL: postgres://hybrid_user:hybrid_password@postgres_test:5432/hybrid_api_test
      TEST_MONGO_URI: mongodb://mongo_user:mongo_password@mongo_test:27017/hybrid_api_test?authSource=admin
    command: ["npm", "run", "dev"]

  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybrid_api_test
    env_file:
      - .env
    environment:
      NODE_ENV: test
      TEST_DATABASE_URL: postgres://hybrid_user:hybrid_password@postgres_test:5432/hybrid_api_test
      TEST_MONGO_URI: mongodb://mongo_user:mongo_password@mongo_test:27017/hybrid_api_test?authSource=admin
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - postgres_test
      - mongo_test
    command: ["npm", "test"]

  postgres:
    image: postgres:16-alpine
    container_name: hybrid_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: hybrid_mongo
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  postgres_test:
    image: postgres:16-alpine
    container_name: hybrid_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_DB: hybrid_api_test
      POSTGRES_USER: hybrid_user
      POSTGRES_PASSWORD: hybrid_password
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  mongo_test:
    image: mongo:7
    container_name: hybrid_mongo_test
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
      MONGO_INITDB_DATABASE: hybrid_api_test
    volumes:
      - mongo_test_data:/data/db

volumes:
  postgres_data:
  mongo_data:
  postgres_test_data:
  mongo_test_data:
