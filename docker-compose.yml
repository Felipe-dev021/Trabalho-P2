services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybrid_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      TEST_DATABASE_URL: postgres://hybrid_user:hybrid_password@postgres_test:5432/hybrid_api_test
      TEST_MONGO_URI: mongodb://mongo_user:mongo_password@mongo_test:27017/hybrid_api_test?authSource=admin
    command: ["npm", "run", "dev"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  test:
    profiles:
      - test
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybrid_api_test
    env_file:
      - .env
    environment:
      NODE_ENV: test
      TEST_DATABASE_URL: postgres://hybrid_user:hybrid_password@postgres_test:5432/hybrid_api_test
      TEST_MONGO_URI: mongodb://mongo_user:mongo_password@mongo_test:27017/hybrid_api_test?authSource=admin
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      postgres_test:
        condition: service_healthy
      mongo_test:
        condition: service_healthy
    command: ["npm", "test"]

  postgres:
    image: postgres:16-alpine
    container_name: hybrid_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - backend_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hybrid_user -d hybrid_api"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo:
    image: mongo:7
    container_name: hybrid_mongo
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - backend_mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username mongo_user --password mongo_password --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  postgres_test:
    profiles:
      - test
    image: postgres:16-alpine
    container_name: hybrid_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_DB: hybrid_api_test
      POSTGRES_USER: hybrid_user
      POSTGRES_PASSWORD: hybrid_password
    volumes:
      - backend_postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hybrid_user -d hybrid_api_test"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo_test:
    profiles:
      - test
    image: mongo:7
    container_name: hybrid_mongo_test
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
      MONGO_INITDB_DATABASE: hybrid_api_test
    volumes:
      - backend_mongo_test_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username mongo_user --password mongo_password --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  backend_postgres_data:
  backend_mongo_data:
  backend_postgres_test_data:
  backend_mongo_test_data:
